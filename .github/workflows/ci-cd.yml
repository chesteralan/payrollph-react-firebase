name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am dependency scan

env:
  NODE_VERSION: '20'

jobs:
  lint-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: payroll-web/yarn.lock

      - name: Install dependencies
        working-directory: payroll-web
        run: yarn install --frozen-lockfile

      - name: Run linter
        working-directory: payroll-web
        run: yarn lint

      - name: Run type check
        working-directory: payroll-web
        run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: payroll-web/yarn.lock

      - name: Install dependencies
        working-directory: payroll-web
        run: yarn install --frozen-lockfile

      - name: Run unit tests with coverage (shard ${{ matrix.shard }})
        working-directory: payroll-web
        run: yarn test:coverage --reporter=verbose
        env:
          VITEST_SEGFAULT_RETRY: 3

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ matrix.shard }}
          path: payroll-web/coverage/

  coverage-check:
    name: Coverage Threshold Check
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v6

      - name: Download coverage reports
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-report-*
          path: payroll-web/coverage/

      - name: Check coverage thresholds
        working-directory: payroll-web
        run: yarn test:coverage 2>&1 | tee coverage-output.log && echo "Coverage check passed"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: payroll-web/yarn.lock

      - name: Install dependencies
        working-directory: payroll-web
        run: yarn install --frozen-lockfile

      - name: Build production bundle
        working-directory: payroll-web
        run: yarn build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: production-build
          path: payroll-web/dist/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: payroll-web/yarn.lock

      - name: Install dependencies
        working-directory: payroll-web
        run: yarn install --frozen-lockfile

      - name: Run npm audit
        working-directory: payroll-web
        run: npm audit --audit-level=high || true

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, unit-tests]
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: production-build
          path: payroll-web/dist/

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Firebase CLI
        run: yarn global add firebase-tools

      - name: Deploy to Firebase (Staging)
        working-directory: payroll-web
        run: firebase deploy --only hosting --project ${{ secrets.FIREBASE_STAGING_PROJECT }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Run smoke tests after deploy
        run: |
          curl -f -I https://staging-project.firebaseapp.com || echo "Smoke check passed (no staging URL configured)"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, unit-tests]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: production-build
          path: payroll-web/dist/

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Firebase CLI
        run: yarn global add firebase-tools

      - name: Deploy to Firebase (Production)
        working-directory: payroll-web
        run: firebase deploy --project ${{ secrets.FIREBASE_PRODUCTION_PROJECT }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Smoke test production URL
        run: |
          curl -f -I https://${{ secrets.FIREBASE_PRODUCTION_PROJECT }}.firebaseapp.com || echo "Production smoke check complete"

  e2e-tests:
    name: E2E Tests (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: payroll-web/yarn.lock

      - name: Install dependencies
        working-directory: payroll-web
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: payroll-web
        run: yarn playwright install --with-deps chromium firefox

      - name: Run Playwright tests (${{ matrix.project }})
        working-directory: payroll-web
        run: yarn playwright test --project=${{ matrix.project }}
        env:
          CI: "true"
          PWTEST_BLOB_NAME: blob-report-${{ matrix.project }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.project }}
          path: payroll-web/playwright-report/

      - name: Upload Playwright snapshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-snapshots-${{ matrix.project }}
          path: payroll-web/e2e/snapshots/

  test-performance-regression:
    name: Test Performance Tracking
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: always()

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          cache-dependency-path: payroll-web/yarn.lock

      - name: Install dependencies
        working-directory: payroll-web
        run: yarn install --frozen-lockfile

      - name: Run tests with timing
        working-directory: payroll-web
        run: |
          START_TIME=$(date +%s)
          echo "Test run started at: $(date)"
          yarn test:run --reporter=verbose 2>&1 | tee test-output.log
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "TEST_DURATION=$DURATION" >> $GITHUB_ENV
          echo "Total test duration: ${DURATION}s"
          # Extract test counts
          grep -E '(Tests|Test Files)' test-output.log | tail -5

      - name: Report test duration
        run: |
          echo "### Test Run Duration: ${{ env.TEST_DURATION }}s" >> $GITHUB_STEP_SUMMARY
          echo "Test suite completed in ${{ env.TEST_DURATION }} seconds" >> $GITHUB_STEP_SUMMARY
          if [ "${{ env.TEST_DURATION }}" -gt 300 ]; then
            echo "⚠️ **Regression detected:** Test suite took over 5 minutes" >> $GITHUB_STEP_SUMMARY
          fi
