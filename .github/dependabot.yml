version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/payroll-web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Manila"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "deps"
      prefix-development: "deps(dev)"
    groups:
      react:
        patterns:
          - "react*"
          - "@types/react*"
      firebase:
        patterns:
          - "firebase*"
          - "@firebase/*"
      testing:
        patterns:
          - "@testing-library/*"
          - "vitest*"
          - "@vitest/*"
          - "playwright*"
          - "@playwright/*"
      linting:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "prettier*"
          - "typescript-eslint*"
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
